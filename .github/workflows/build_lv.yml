name: Build EXE LV
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install huawei-lte-api pyinstaller
      - run: pyinstaller --onefile --windowed --noupx --name Hua4GMon main.py
      - uses: actions/upload-artifact@v4
        with:
          name: Hua4GMon-windows
          path: dist/Hua4GMon.exe
